<!DOCTYPE html>
<html lang="en">
<head>
    <title>Home Page</title>
    <!-- Bootstrap CSS -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <!-- display a flash message here, if necessary -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <div class="container">
        <h1 class="mt-5">Nicks User Cloud Storage</h1>

        <div class="mt-3">
            <a href="/add-user" class="btn btn-primary">Add User</a>
            <a href="/delete-user" class="btn btn-danger">Delete User</a>
            <a href="/update-user" class="btn btn-secondary">Update User</a>
            <a href="/display-users" class="btn btn-info">Display All Users</a>
            <a href="/search-genre" class="btn btn-warning">Search People by Genre</a>
        </div>

        <div class="text-center mt-4">
        </div>
        <img src="{{ url_for('static', filename='static.webp') }}" width="400">
    </div>

</body>
</html>
